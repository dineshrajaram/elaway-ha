name: Release on version bump

# When custom_components/elaway/manifest.json's version changes on main,
# create the matching vX.Y.Z tag + GitHub Release so HACS surfaces the update.
on:
  push:
    branches: [main]
    paths:
      - custom_components/elaway/manifest.json

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read manifest version
        id: ver
        run: |
          version=$(jq -r .version custom_components/elaway/manifest.json)
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "::error::manifest.json has no version"; exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: check
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.ver.outputs.tag }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.ver.outputs.tag }} already exists — nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag + release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "${{ steps.ver.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --generate-notes
